<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>毛孩樂園 寵物服務</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #FDF6EC;
    --warm-brown: #5C3D2E;
    --soft-orange: #E8915A;
    --blush: #F2C4A0;
    --sage: #8BAA8B;
    --sage-dark: #6E8E6E;
    --white: #FFFFFF;
    --text-muted: #9A8575;
    --shadow: rgba(92, 61, 46, 0.08);
  }

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--cream);
    color: var(--warm-brown);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 0;
  }

  .page {
    width: 100%;
    max-width: 480px;
    min-height: 100vh;
    background: var(--white);
    position: relative;
    overflow: hidden;
  }

  /* ── Hero Image ── */
  .hero {
    width: 100%;
    height: 320px;
    position: relative;
    overflow: hidden;
  }

  .hero img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .hero-placeholder {
    width: 100%;
    height: 100%;
    background: linear-gradient(145deg, var(--blush), var(--soft-orange));
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    color: var(--white);
  }

  .hero-placeholder svg {
    opacity: 0.6;
  }

  .hero-placeholder span {
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 0.5px;
    opacity: 0.7;
  }

  .hero-curve {
    position: absolute;
    bottom: -2px;
    left: 0;
    width: 100%;
  }

  /* ── Content ── */
  .content {
    padding: 28px 28px 40px;
    animation: fadeUp 0.6s ease both;
    animation-delay: 0.15s;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .business-name {
    font-family: 'Noto Serif TC', serif;
    font-size: 28px;
    font-weight: 700;
    line-height: 1.3;
    color: var(--warm-brown);
    margin-bottom: 4px;
  }

  .tagline {
    font-size: 14px;
    color: var(--text-muted);
    font-weight: 600;
    letter-spacing: 0.3px;
    margin-bottom: 28px;
  }

  /* ── Cards ── */
  .card {
    background: var(--cream);
    border-radius: 16px;
    padding: 20px 22px;
    margin-bottom: 14px;
    display: flex;
    align-items: flex-start;
    gap: 16px;
    transition: transform 0.2s ease, box-shadow 0.2s ease;
  }

  .card:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px var(--shadow);
  }

  .card-icon {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .card-icon.hours { background: rgba(139, 170, 139, 0.18); color: var(--sage-dark); }
  .card-icon.phone { background: rgba(232, 145, 90, 0.15); color: var(--soft-orange); }
  .card-icon.line  { background: rgba(6, 199, 85, 0.12); color: #06C755; }

  .card-body {
    flex: 1;
    min-width: 0;
  }

  .card-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.8px;
    color: var(--text-muted);
    margin-bottom: 6px;
  }

  .card-value {
    font-size: 15px;
    font-weight: 700;
    color: var(--warm-brown);
    line-height: 1.4;
  }

  /* ── Hours Grid ── */
  .hours-grid {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 3px 14px;
    font-size: 14px;
    line-height: 1.8;
  }

  .hours-grid .day {
    font-weight: 700;
    color: var(--warm-brown);
    white-space: nowrap;
  }

  .hours-grid .time {
    font-weight: 600;
    color: var(--text-muted);
    text-align: right;
    white-space: nowrap;
  }

  .hours-grid .closed {
    color: var(--soft-orange);
    font-weight: 700;
  }

  /* ── Link Card ── */
  a.card {
    text-decoration: none;
    color: inherit;
    cursor: pointer;
  }

  a.card .arrow {
    align-self: center;
    margin-left: auto;
    color: var(--text-muted);
    opacity: 0.5;
    transition: transform 0.2s ease, opacity 0.2s ease;
    flex-shrink: 0;
  }

  a.card:hover .arrow {
    transform: translateX(3px);
    opacity: 1;
  }

  /* ── Phone Link ── */
  a.phone-link {
    color: var(--soft-orange);
    text-decoration: none;
    font-weight: 700;
    font-size: 17px;
    letter-spacing: 0.3px;
  }

  /* ── Paw Divider ── */
  .paw-divider {
    text-align: center;
    margin: 24px 0 8px;
    opacity: 0.2;
  }

  /* ── Claim Banner ── */
  .claim-banner {
    text-align: center;
    padding: 20px 28px 32px;
    animation: fadeUp 0.6s ease both;
    animation-delay: 0.4s;
  }

  .claim-banner p {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.8;
  }

  .claim-banner a {
    color: var(--sage-dark);
    font-weight: 700;
    text-decoration: none;
    border-bottom: 1.5px solid rgba(110, 142, 110, 0.3);
    transition: border-color 0.2s;
  }

  .claim-banner a:hover {
    border-color: var(--sage-dark);
  }

  /* ── Status Dot ── */
  .status {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    font-weight: 700;
    letter-spacing: 0.6px;
    margin-bottom: 20px;
  }

  .status-dot {
    width: 7px;
    height: 7px;
    border-radius: 50%;
    animation: pulse 2s ease infinite;
  }

  .status.open .status-dot { background: var(--sage); }
  .status.open { color: var(--sage-dark); }
  .status.closed .status-dot { background: var(--soft-orange); animation: none; }
  .status.closed { color: var(--text-muted); }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.85); }
  }

  @media (max-width: 480px) {
    .hero { height: 280px; }
    .content { padding: 24px 22px 32px; }
    .business-name { font-size: 26px; }
  }
</style>
</head>
<body>

<div class="page">

  <!-- Hero Image -->
  <div class="hero">
    <div class="hero-placeholder">
      <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="4" r="2"/><circle cx="18" cy="8" r="2"/><circle cx="4" cy="8" r="2"/>
        <circle cx="7" cy="4" r="2"/>
        <path d="M12 14c3 0 5 2.5 5 5 0 1.5-1 2-2.5 2h-5C8 21 7 20.5 7 19c0-2.5 2-5 5-5z"/>
      </svg>
      <span>封面照片</span>
    </div>
    <svg class="hero-curve" viewBox="0 0 480 28" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M0 28V8C80 -2 160 -2 240 8C320 18 400 18 480 8V28H0Z" fill="var(--white)"/>
    </svg>
  </div>

  <!-- Content -->
  <div class="content">

    <h1 class="business-name">毛孩樂園</h1>
    <p class="tagline">寵物美容與照護服務</p>

    <!-- Open / Closed Status -->
    <div class="status open" id="businessStatus">
      <span class="status-dot"></span>
      <span id="statusText">營業中</span>
    </div>

    <!-- Business Hours -->
    <div class="card">
      <div class="card-icon hours">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>
        </svg>
      </div>
      <div class="card-body">
        <div class="card-label">營業時間</div>
        <div class="hours-grid">
          <span class="day">週一 至 週五</span><span class="time">09:00 – 18:00</span>
          <span class="day">週六</span><span class="time">10:00 – 16:00</span>
          <span class="day">週日</span><span class="time closed">公休</span>
        </div>
      </div>
    </div>

    <!-- Phone -->
    <div class="card">
      <div class="card-icon phone">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6A19.79 19.79 0 0 1 2.12 4.18 2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/>
        </svg>
      </div>
      <div class="card-body">
        <div class="card-label">聯絡電話</div>
        <a href="tel:+886212345678" class="phone-link">02-1234-5678</a>
      </div>
    </div>

    <!-- LINE -->
    <a class="card" href="https://line.me/R/ti/p/@pawsandco" target="_blank" rel="noopener">
      <div class="card-icon line">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 2C6.48 2 2 5.83 2 10.5c0 3.78 3.15 6.96 7.42 7.93.29.06.68.19.78.44.09.22.06.57.03.79l-.13.76c-.04.22-.17.87.76.47.93-.39 5.02-2.96 6.85-5.07C19.78 13.48 22 12.12 22 10.5 22 5.83 17.52 2 12 2zm-3.5 11h-2a.5.5 0 0 1-.5-.5v-4a.5.5 0 0 1 1 0V12h1.5a.5.5 0 0 1 0 1zm1.5-.5a.5.5 0 0 1-1 0v-4a.5.5 0 0 1 1 0v4zm4.5.5h-2a.5.5 0 0 1-.5-.5v-4a.5.5 0 0 1 1 0v3.27l1.77-2.51a.5.5 0 0 1 .91.29v4a.5.5 0 0 1-1 0V9.73l-1.77 2.51a.5.5 0 0 1-.41.26zm4-.5a.5.5 0 0 1 0 1h-2a.5.5 0 0 1-.5-.5v-4a.5.5 0 0 1 .5-.5h2a.5.5 0 0 1 0 1H17v1h1.5a.5.5 0 0 1 0 1H17v1h1.5z"/>
        </svg>
      </div>
      <div class="card-body">
        <div class="card-label">LINE 線上諮詢</div>
        <div class="card-value">@pawsandco</div>
      </div>
      <svg class="arrow" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="9 18 15 12 9 6"/>
      </svg>
    </a>

    <!-- Paw Divider -->
    <div class="paw-divider">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="var(--warm-brown)" opacity="0.4">
        <circle cx="11" cy="4" r="2"/><circle cx="18" cy="8" r="2"/><circle cx="4" cy="8" r="2"/>
        <circle cx="7" cy="4" r="2"/>
        <path d="M12 14c3 0 5 2.5 5 5 0 1.5-1 2-2.5 2h-5C8 21 7 20.5 7 19c0-2.5 2-5 5-5z"/>
      </svg>
    </div>

  </div>

  <!-- Claim Banner -->
  <div class="claim-banner">
    <p>這是您的商家嗎？<br><a href="#">認領此頁面</a>以更新您的資訊。</p>
  </div>

</div>

<script>
  (function() {
    const now = new Date();
    const day = now.getDay();
    const hour = now.getHours();
    const min = now.getMinutes();
    const time = hour + min / 60;

    let isOpen = false;
    if (day >= 1 && day <= 5) {
      isOpen = time >= 9 && time < 18;
    } else if (day === 6) {
      isOpen = time >= 10 && time < 16;
    }

    const el = document.getElementById('businessStatus');
    const txt = document.getElementById('statusText');
    if (!isOpen) {
      el.classList.remove('open');
      el.classList.add('closed');
      txt.textContent = '休息中';
    }
  })();
</script>

</body>
</html>
